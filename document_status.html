<!DOCTYPE html>
<html>

<head>

<title>Document Status Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#d6ecff,#eef8ff);
}


/* Header */

.header{

    background:#1565c0;
    color:white;
    padding:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;

}


/* Container */

.container{

    width:70%;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.2);

}


/* Title */

h2{

    text-align:center;
    color:#1565c0;
    font-size:30px;

}


/* Cards */

.cards{

    display:flex;
    justify-content:space-around;
    margin:30px 0;

}


.card{

    width:180px;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 5px 15px #ccc;

}


.card h3{

    font-size:18px;

}


.card p{

    font-size:30px;
    font-weight:bold;

}


.active{

    border-top:6px solid green;

}


.expiring{

    border-top:6px solid orange;

}


.expired{

    border-top:6px solid red;

}


/* Chart */

.chart-box{

    width:450px;
    margin:auto;

}



/* Back button */

.back{

    text-align:center;
    margin-top:30px;

}


.back a{

    background:#1565c0;
    color:white;
    padding:12px 30px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;

}


.back a:hover{

    background:#0d47a1;

}


</style>

</head>


<body>


<div class="header">

📊 Document Status Dashboard

</div>



<div class="container">


<h2>
AI Document Renewal Analysis
</h2>



<div class="cards">


<div class="card active">

<h3>🟢 Active</h3>

<p>{{active}}</p>

</div>



<div class="card expiring">

<h3>🟡 Expiring Soon</h3>

<p>{{expiring}}</p>

</div>



<div class="card expired">

<h3>🔴 Expired</h3>

<p>{{expired}}</p>

</div>


</div>




<div class="chart-box">

<canvas id="statusChart"></canvas>

</div>



<div class="back">

<a href="/">
🏠 Back to Home
</a>

</div>


</div>





<script>


const ctx = document.getElementById('statusChart');


new Chart(ctx, {


type: 'doughnut',


data: {


labels: [

'🟢 Active Documents',

'🟡 Expiring Soon',

'🔴 Expired Documents'

],



datasets: [{


data: [

Number("{{active}}"),

Number("{{expiring}}"),

Number("{{expired}}")

]


}]


},



options:{


responsive:true,


plugins:{


legend:{


position:'bottom'


}


}


}


});


</script>



</body>

</html>
