<!DOCTYPE html>
<html>
<head>

<title>Saved Documents</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(to right,#d6ecff,#eef8ff);
    margin:0;
    padding:0;
}

/* Main Container */

.container{
    width:90%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

/* Heading */

h2{
    text-align:center;
    color:#1565c0;
    font-size:32px;
    margin-bottom:25px;
}

/* Search */

.search{
    text-align:right;
    margin-bottom:20px;
}

.search input{
    width:280px;
    padding:10px 15px;
    border-radius:25px;
    border:1px solid #1565c0;
    outline:none;
    font-size:15px;
}

/* Table */

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1565c0;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#e3f2fd;
}

/* Delete Button */

.delete-btn{
    background:#e53935;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.delete-btn:hover{
    background:#c62828;
}

/* Back Button */

.back{
    text-align:center;
    margin-top:25px;
}

.back a{
    background:#1565c0;
    color:white;
    padding:12px 25px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
}

.back a:hover{
    background:#0d47a1;
}

</style>

</head>

<body>

<div class="container">

<h2>📂 Saved Documents</h2>

<div class="search">
<input type="text"
id="searchInput"
placeholder="🔍 Search Documents..."
onkeyup="searchTable()">
</div>

<table id="documentTable">

<tr>
<th>ID</th>
<th>Document Name</th>
<th>Document Number</th>
<th>Expiry Date</th>
<th>File Name</th>
<th>Action</th>
</tr>

{% for doc in documents %}

<tr>

<td>{{doc[0]}}</td>

<td>📄 {{doc[1]}}</td>

<td>{{doc[2]}}</td>

<td>📅 {{doc[3]}}</td>

<td>📎 {{doc[4]}}</td>

<td>

<a href="/delete/{{doc[0]}}" onclick="return confirm('Are you sure you want to delete this document?')">

<button class="delete-btn">

🗑 Delete

</button>

</a>

</td>

</tr>

{% endfor %}

</table>

<div class="back">

<a href="/">

🏠 Back to Home

</a>

</div>

</div>

<script>

function searchTable(){

let input=document.getElementById("searchInput");

let filter=input.value.toUpperCase();

let table=document.getElementById("documentTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td=tr[i].getElementsByTagName("td");

let found=false;

for(let j=0;j<td.length-1;j++){

if(td[j]){

let txt=td[j].textContent || td[j].innerText;

if(txt.toUpperCase().indexOf(filter)>-1){

found=true;

}

}

}

tr[i].style.display=found?"":"none";

}

}

</script>

</body>
</html>
