<!DOCTYPE html>
<html>
<head>
    <title>Add Document</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #d6ecff;
}


/* Form Box */
.container {

    width:420px;

    margin:50px auto;

    background:#f8fcff;

    padding:25px;

    border-radius:15px;

    border:2px solid #1565c0;

    box-shadow:0px 8px 20px rgba(21,101,192,0.3);

}


/* Heading */
h2 {

    text-align:center;

    color:#1565c0;

    font-size:28px;

    margin-bottom:25px;

}


/* Labels */
label {

    font-weight:bold;

    color:#333;

}


/* Input Fields */
input, select {

    width:100%;

    padding:10px;

    margin-top:5px;

    border-radius:8px;

    border:1px solid #90caf9;

    font-size:15px;

    box-sizing:border-box;

}


input:focus, select:focus {

    outline:none;

    border:2px solid #1565c0;

}


/* File Upload */
input[type="file"] {

    border:none;

}


/* Save Button */
input[type="submit"] {

    background:#1565c0;

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    border:none;

    padding:12px;

    border-radius:10px;

}


input[type="submit"]:hover {

    background:#0d47a1;

}


/* Back Button */
.back {

    text-align:center;

    margin-top:20px;

}


.back a {

    color:#1565c0;

    font-size:17px;

    font-weight:bold;

    text-decoration:none;

}


.back a:hover {

    text-decoration:underline;

}

</style>

</head>


<body>


<div class="container">


<h2>📄 Add New Document</h2>


<form action="/save_document" method="POST" enctype="multipart/form-data">


<label>Document Name</label>
<input 
type="text" 
name="document_name" 
placeholder="Enter document name"
required>


<br><br>


<label>Document Number</label>
<input 
type="text" 
name="document_number"
placeholder="Enter document number"
required>


<br><br>


<label>Expiry Date</label>
<input 
type="date" 
name="expiry_date"
required>


<br><br>


<label>Upload Document</label>
<input 
type="file" 
name="document_file">


<br><br>


<label>Email</label>
<input 
type="email" 
name="email"
placeholder="Enter email address"
required>


<br><br>


<label>⏰ Remind Before</label>

<select name="reminder_days" required>

<option value="1">1 Day Before</option>

<option value="5">5 Days Before</option>

<option value="10">10 Days Before</option>

<option value="30">30 Days Before</option>

</select>


<br><br>


<input 
type="submit" 
value="💾 Save Document">


</form>



<div class="back">

<a href="/">
🏠 Back to Home
</a>

</div>


</div>


</body>

</html>
